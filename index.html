<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cardpay.com Checkout</title>
<style>
body{margin:0;font-family:Arial;background:#0b1020;color:#fff;display:grid;place-items:center;min-height:100vh}
.box{background:#11182d;padding:28px;border-radius:22px;width:min(420px,92vw)}
button{width:100%;padding:16px;border:0;border-radius:999px;font-weight:700;cursor:pointer}
#msg{margin-top:12px;opacity:.8}
.header{font-size:28px;font-weight:900;margin-bottom:6px}
.sub{opacity:.7;margin-bottom:18px}
</style>
</head>
<body>
<div class="box">
<div class="header">cardpay.com</div>
<div class="sub">Secure Payment Checkout</div>
<button id="pay">Pay $1.00</button>
<div id="msg"></div>
</div>

<script>
const msg=t=>document.getElementById('msg').textContent=t;

async function openPay(){
 try{
  const req=new PaymentRequest(
  [{
    supportedMethods: location.origin + '/pay/main.json'
  }],
  {
    total:{label:'cardpay.com',amount:{currency:'USD',value:'1.00'}},
    displayItems:[{label:'CardPay Test Charge',amount:{currency:'USD',value:'1.00'}}]
  }
  );

  const res=await req.show();
  await res.complete('success');
  msg('Payment completed (test mode)');
 }catch(e){
  console.log(e);
  msg('Payment failed or unsupported browser');
 }
}

document.getElementById('pay').onclick=openPay;
</script>
</body>
</html>
