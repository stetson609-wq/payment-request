<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CardPay · Payment Request API</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0e 0%, #050508 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 550px;
      width: 100%;
      background: rgba(18, 18, 24, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      text-align: center;
      padding: 40px 30px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 15px;
      letter-spacing: -0.02em;
    }

    .badge {
      display: inline-block;
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 5px 15px;
      border-radius: 50px;
      font-size: 0.7rem;
      color: #a855f7;
      margin-bottom: 25px;
    }

    .url-input-group {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 60px;
      padding: 5px;
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .url-input-group input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 20px;
      color: white;
      font-size: 0.9rem;
      font-family: monospace;
      outline: none;
    }

    .url-input-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .preset-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255, 255, 255, 0.7);
    }

    .preset:hover {
      background: rgba(168, 85, 247, 0.2);
      border-color: rgba(168, 85, 247, 0.4);
    }

    .pay-button {
      background: linear-gradient(135deg, #ffffff, #e0e0e0);
      border: none;
      border-radius: 80px;
      padding: 20px 40px;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      margin-bottom: 25px;
    }

    .pay-button:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
    }

    .pay-button:active {
      transform: scale(0.98);
    }

    .pay-button span:first-child {
      font-size: 2rem;
      font-weight: 800;
      display: block;
      color: #000;
    }

    .pay-button span:last-child {
      font-size: 0.8rem;
      color: #444;
      display: block;
      margin-top: 5px;
    }

    .info {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 20px;
      line-height: 1.5;
    }

    .info a {
      color: #a855f7;
      text-decoration: none;
    }

    .status {
      margin-top: 15px;
      padding: 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      background: rgba(0, 0, 0, 0.3);
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CardPay</h1>
    <div class="badge">🔒 Payment Request API · Service Worker</div>

    <div class="url-input-group">
      <input type="text" id="urlInput" value="https://cardpay.com" placeholder="Enter URL to open in payment sheet...">
    </div>

    <div class="preset-buttons">
      <div class="preset" data-url="https://cardpay.com">💳 CardPay.com</div>
      <div class="preset" data-url="https://paypal.com">🏦 PayPal</div>
      <div class="preset" data-url="https://stripe.com">⚡ Stripe</div>
      <div class="preset" data-url="https://google.com">🌐 Google</div>
    </div>

    <button class="pay-button" id="payBtn">
      <span>💳 THE PAYMENT</span>
      <span>Secure Payment Request API</span>
    </button>

    <div class="info">
      Uses Payment Request API with Service Worker<br>
      Opens in a native 3-minute secure sheet · No history saved<br>
      <a href="#" id="howItWorksLink">How it works →</a>
    </div>
    <div class="status" id="status">✅ Ready · Click button to open payment sheet</div>
  </div>

  <script>
    // Get the current origin
    const origin = window.location.origin;
    
    // Register Service Worker from root
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(reg => {
          console.log('Service Worker registered:', reg);
          document.getElementById('status').innerHTML = '✅ Service Worker ready · Click to pay';
        })
        .catch(err => {
          console.error('SW registration failed:', err);
          document.getElementById('status').innerHTML = '⚠️ Service Worker failed: ' + err.message;
        });
    } else {
      document.getElementById('status').innerHTML = '❌ Service Worker not supported · Use Chrome/Edge';
    }

    // Preset URL buttons
    document.querySelectorAll('.preset').forEach(btn => {
      btn.addEventListener('click', () => {
        const url = btn.dataset.url;
        document.getElementById('urlInput').value = url;
        document.getElementById('status').innerHTML = `🔗 URL set to: ${url}`;
      });
    });

    // Payment function
    async function triggerPayment() {
      const targetUrl = document.getElementById('urlInput').value.trim();
      
      if (!targetUrl) {
        document.getElementById('status').innerHTML = '❌ Please enter a URL';
        return;
      }

      if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
        document.getElementById('status').innerHTML = '❌ URL must start with http:// or https://';
        return;
      }

      document.getElementById('status').innerHTML = '🔄 Opening payment sheet...';
      
      // Ensure service worker is ready
      if (navigator.serviceWorker.controller) {
        console.log('Service worker controller ready');
      } else {
        await navigator.serviceWorker.ready;
      }

      try {
        const paymentMethods = [
          {
            supportedMethods: origin + '/pay/main.json',
            data: { url: targetUrl }
          }
        ];
        
        const paymentDetails = {
          total: {
            label: 'CardPay Secure Transaction',
            amount: { value: '1.00', currency: 'USD' }
          }
        };
        
        const request = new PaymentRequest(paymentMethods, paymentDetails);
        
        const response = await request.show();
        await response.complete('success');
        document.getElementById('status').innerHTML = '✅ Payment sheet closed successfully';
        
      } catch (err) {
        if (err.name === 'AbortError') {
          document.getElementById('status').innerHTML = '❌ Payment cancelled · You closed the sheet';
        } else {
          console.error('Payment error:', err);
          document.getElementById('status').innerHTML = `❌ Error: ${err.message}`;
        }
      }
    }

    document.getElementById('payBtn').addEventListener('click', triggerPayment);
  </script>
</body>
</html>
